name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify dependencies
        run: go mod verify

      - name: Generate files
        run: go generate ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with coverage
        run: go test -v -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run golangci-lint
        if: matrix.os == 'ubuntu-latest'
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v2.12.2
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: false

  race-detection:
    name: Race Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Generate files
        run: go generate ./...

      - name: Run tests with race detector
        run: go test -race -short -count=1 ./...

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Generate files
        run: go generate ./...

      - name: Run benchmarks
        run: |
          go test -bench . -benchmem -count=3 -short \
            ./coord/... ./plan/... ./magnitude/... ./time/... ./atmosphere/... \
            | tee bench.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ github.sha }}
          path: bench.txt
          retention-days: 90

  integration:
    name: Integration Tests (External APIs)
    runs-on: ubuntu-latest
    continue-on-error: true  # external APIs may be temporarily unavailable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Generate files
        run: go generate ./...

      - name: Run integration tests
        run: go test -tags=integration -v -count=1 -timeout=10m ./...
